<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - ZbraneLevne</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="header">
    <h1>🔐 Admin panel</h1>
    <nav>
      <a href="index.html">← zpět na web</a>
    </nav>
  </header>

  <main>

    <section class="login-box">
      <h2>Přihlášení admina</h2>

      <input type="text" placeholder="Email" id="email">
      <input type="password" placeholder="Heslo" id="password">

      <button onclick="login()">Přihlásit se</button>

      <p id="status"></p>
    </section>

    <section class="admin-panel hidden" id="admin-panel">
      <h2>Správa produktů</h2>

      <input type="text" placeholder="Název produktu">
      <input type="number" placeholder="Cena">
      <input type="number" placeholder="Sklad">
      <input type="text" placeholder="URL fotky">

      <button>Přidat produkt</button>

      <div id="admin-products"></div>
    </section>

  </main>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
