<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - CZ Tactical</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="header">
    <h1>🔐 Admin panel</h1>
    <nav>
      <a href="index.html">← zpět na web</a>
    </nav>
  </header>

  <main>

    <!-- LOGIN -->
    <section class="login-box" id="login-box">
      <h2>Přihlášení admina</h2>

      <input type="text" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Heslo">

      <button onclick="login()">Přihlásit se</button>

      <p id="status"></p>
    </section>

    <!-- ADMIN PANEL -->
    <section class="admin-panel hidden" id="admin-panel">
      <h2>Správa produktů</h2>

      <input type="text" id="name" placeholder="Název produktu">
      <input type="number" id="price" placeholder="Cena">
      <input type="number" id="stock" placeholder="Sklad">

      <!-- KATEGORIE -->
      <select id="category">
        <option value="Airsoft">Airsoft</option>
        <option value="Optika">Optika</option>
        <option value="Oblečení">Oblečení</option>
        <option value="Outdoor">Outdoor</option>
        <option value="Vojenské vybavení">Vojenské vybavení</option>
      </select>

      <textarea id="description" placeholder="Popisek produktu"></textarea>

<input type="text" id="image" placeholder="URL obrázku 1">
<input type="text" id="image2" placeholder="URL obrázku 2">
<input type="text" id="image3" placeholder="URL obrázku 3">

      <button onclick="addProduct()">➕ Přidat produkt</button>

      <hr>

      <div id="admin-products"></div>
    </section>

  </main>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
